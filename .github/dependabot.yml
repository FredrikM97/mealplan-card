version: 2

updates:
  # All npm dependencies in a single PR
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day-of-month: 1

    groups:
      all-dependencies:
        patterns:
          - "*"

    open-pull-requests-limit: 1

  # All GitHub Actions in a single PR
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

    groups:
      all-actions:
        patterns:
          - "*"

    open-pull-requests-limit: 1
